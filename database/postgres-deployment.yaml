apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bookstore
  labels:
    app: postgres
    tier: database

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres
        tier: database

    spec:
      securityContext:
        fsGroup: 999

      containers:
      - name: postgres
        image: postgres:15-alpine

        ports:
        - containerPort: 5432
          name: postgres

        envFrom:
        - secretRef:
            name: db-credentials

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "1000m"

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-data