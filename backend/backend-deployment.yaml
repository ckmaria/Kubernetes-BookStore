apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bookstore
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: api
        version: v1.0
    spec:
      containers:
      - name: api
        image: gcr.io/google-samples/gb-backend:v1
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GET_HOSTS_FROM
          value: dns
        envFrom:
        - secretRef:
            name: db-credentials
        - configMapRef:
            name: app-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
